{% extends 'base.html' %}

{% block content %}

<section class='auth-wrapper'>

    <div class='auth-card'>

        <p class='eyebrow'>That Corporate Flow</p>

        <h2>Welcome Back</h2>

        <p class='auth-text'>
            Log into your corporate automation workspace.
        </p>

        {% if form.errors %}
            <div class='alert danger-alert'>
                Invalid username or password.
            </div>
        {% endif %}

        <form method='post'>

            {% csrf_token %}

            <div class='form-group'>
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class='form-group'>
                <label>Password</label>
                {{ form.password }}
            </div>

            <button class='btn primary auth-btn' type='submit'>
                Login
            </button>

        </form>

        <div class='auth-footer'>
            <p>
                Need an account?
                <a href='{% url "register" %}'>Register</a>
            </p>
        </div>

    </div>

</section>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<section class='page-header'>
    <p class='eyebrow'>Internal Operations</p>

    <h2>{{ title }}</h2>

    <p>Create or update an internal staff task.</p>
</section>

<section class='panel form-panel'>
    <form method='post'>
        {% csrf_token %}

        <div class='form-grid'>
            {% for field in form %}
                <div class='form-group'>
                    {{ field.label_tag }}
                    {{ field }}

                    {% if field.errors %}
                        <div class='field-error'>
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

        <div class='hero-actions'>
            <button class='btn primary' type='submit'>
                {{ button_text }}
            </button>

            <a class='btn secondary' href='{% url "task_dashboard" %}'>
                Cancel
            </a>
        </div>
    </form>
</section>

{% endblock %}

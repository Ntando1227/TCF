{% extends 'base.html' %}

{% block content %}

<section class='page-header'>
    <p class='eyebrow'>Client Upload Portal</p>

    <h2>Upload File</h2>

    <p>
        Upload files directly into the
        client folder system.
    </p>
</section>

<section class='panel form-panel'>

    <form method='post' enctype='multipart/form-data'>

        {% csrf_token %}

        <div class='form-group'>
            <label>File Title</label>
            {{ form.title }}
        </div>

        <div class='form-group'>
            <label>Destination Folder</label>
            {{ form.subfolder }}
        </div>

        <div class='form-group'>
            <label>Select File</label>
            {{ form.uploaded_file }}
        </div>

        <div class='hero-actions'>

            <button class='btn primary' type='submit'>
                Upload File
            </button>

            <a
                class='btn secondary'
                href='{% url "client_folder_detail" folder.id %}'
            >
                Cancel
            </a>

        </div>

    </form>

</section>

{% endblock %}
